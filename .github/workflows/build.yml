name: Flutter Build APK

on:
  push:
    branches: [ main ] # If your branch is named 'master', change 'main' to 'master'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
      - name: Install dependencies
        run: |
          flutter clean
          flutter pub get
    

      - name: Build APK
        # This creates the lightweight split APKs you requested
        run: flutter build apk --release --split-per-abi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FleetTracker-APKs
          path: build/app/outputs/flutter-apk/*.apk
