name: drowsiness_app
description: Drowsy Driver Monitoring Dashboard - Real-time Firebase RTDB integration.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase & Cloud Integration
  firebase_core: ^3.15.2
  firebase_database: ^11.1.4
  
  # Image Handling & Cloudinary Support
  cached_network_image: ^3.4.1
  
  # UI & Utilities
  url_launcher: ^6.1.0
  intl: ^0.19.0
  shimmer: ^3.0.0
  cupertino_icons: ^1.0.8
  firebase_auth: ^5.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  # Ensure this folder actually exists in your project sidebar
  assets:
    - assets/images/